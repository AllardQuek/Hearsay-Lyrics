<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="url(#g)"/>
  <!-- Double eighth note -->
  <g fill="white">
    <!-- Beam -->
    <rect x="13" y="9.5" width="11.5" height="2.5" rx="1.2"/>
    <!-- Left stem -->
    <rect x="13" y="9.5" width="2" height="13" rx="0.8"/>
    <!-- Right stem -->
    <rect x="22.5" y="9.5" width="2" height="10.5" rx="0.8"/>
    <!-- Left note head -->
    <ellipse cx="10.5" cy="22.5" rx="4" ry="2.5" transform="rotate(-20 10.5 22.5)"/>
    <!-- Right note head -->
    <ellipse cx="20" cy="20" rx="4" ry="2.5" transform="rotate(-20 20 20)"/>
  </g>
</svg>
